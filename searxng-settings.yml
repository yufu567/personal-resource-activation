# SearXNG configuration — self-hosted metasearch engine
# See https://docs.searxng.org/admin/settings/settings.yml

use_default_settings: true

search:
  safe_search: 1
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json

server:
  secret_key: "change-me-to-random-string-in-production"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

# Engines — aggregate Google, Bing, DuckDuckGo, and regional engines
# SearXNG automatically routes queries to the best engines for the detected language
engines:
  # English-heavy engines
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  # Chinese engines
  - name: bing_zh
    engine: bing
    shortcut: bz
    use_mobile_ui: false
    disabled: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 10
